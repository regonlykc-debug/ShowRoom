<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Khalaifat AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #263B59;
    --steel: #45738E;
    --brass: #B8935A;
    --paper: #F7F5F1;
    --ink: #1B2A3D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Poppins', sans-serif; }
  body {
    background: radial-gradient(circle at 18% -10%, #2f496c 0%, var(--navy) 55%);
    color: var(--paper);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  .logo { font-size: .85rem; letter-spacing: .1em; opacity: .7; }
  .ai-badge {
    background: var(--brass);
    color: var(--navy);
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .1em;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    opacity: .7;
  }
  .welcome h2 { font-size: 1.4rem; font-weight: 500; margin-bottom: 8px; }
  .welcome p { font-size: .85rem; line-height: 1.6; }

  .msg {
    max-width: 85%;
    padding: 14px 18px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: .92rem;
  }
  .msg.user {
    align-self: flex-start;
    background: var(--brass);
    color: var(--navy);
    border-radius: 16px 16px 4px 16px;
    font-weight: 500;
  }
  .msg.ai {
    align-self: flex-end;
    background: rgba(255,255,255,.1);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 16px 16px 16px 4px;
  }
  .msg.ai .sources {
    margin-top: 10px;
    font-size: .72rem;
    opacity: .6;
    letter-spacing: .05em;
  }
  .msg.thinking {
    align-self: flex-end;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 16px 16px 16px 4px;
    font-size: .85rem;
    opacity: .7;
  }
  .dots span {
    animation: blink 1.2s infinite;
    display: inline-block;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

  .input-bar {
    padding: 16px 24px;
    background: rgba(0,0,0,.2);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,.08);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  .input-bar textarea {
    flex: 1;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 12px;
    color: var(--paper);
    font-family: inherit;
    font-size: .92rem;
    padding: 12px 16px;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    outline: none;
    line-height: 1.5;
  }
  .input-bar textarea::placeholder { opacity: .5; }
  .input-bar textarea:focus { border-color: var(--brass); }
  .send-btn {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: var(--brass);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity .2s;
  }
  .send-btn:disabled { opacity: .4; cursor: default; }
  .send-btn svg { width: 20px; height: 20px; fill: var(--navy); }

  .suggestions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 0 24px 12px;
  }
  .suggestion {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.15);
    color: var(--paper);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: .78rem;
    cursor: pointer;
    font-family: inherit;
    transition: background .2s;
  }
  .suggestion:hover { background: rgba(255,255,255,.15); }
</style>
</head>
<body>

<header>
  <div class="logo">KHALAIFAT — AI Assistant</div>
  <div class="ai-badge">Powered by AI</div>
</header>

<div class="chat-area" id="chatArea">
  <div class="welcome">
    <h2>مرحباً بك / Welcome</h2>
    <p>اسألني عن أي منتج في الكتالوجات<br>Ask me anything about our catalogues</p>
  </div>
</div>

<div class="suggestions" id="suggestions">
  <button class="suggestion" onclick="ask('What kitchen hoods does Elica offer?')">Elica hoods</button>
  <button class="suggestion" onclick="ask('ما هي أجهزة البيكو المتاحة؟')">أجهزة BEKO</button>
  <button class="suggestion" onclick="ask('What Bosch appliances are available?')">Bosch appliances</button>
  <button class="suggestion" onclick="ask('ما هي ألوان Silestone المتوفرة؟')">ألوان Silestone</button>
</div>

<div class="input-bar">
  <textarea id="input" placeholder="اسأل عن المنتجات... / Ask about products..." rows="1"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendQuestion()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const SERVER = window.location.origin;
  const chatArea = document.getElementById('chatArea');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  // Tablets' on-screen keyboard shrinks the *visible* area without shrinking
  // 100vh/height:100% in most mobile browsers, so the input bar at the bottom
  // of this flex-column page can end up rendered below the visible area, behind
  // the keyboard. Force the page to the actual visible height via the
  // VisualViewport API so the layout compresses to fit above the keyboard.
  if (window.visualViewport) {
    const fitToVisualViewport = () => {
      document.documentElement.style.height = window.visualViewport.height + 'px';
      document.body.style.height = window.visualViewport.height + 'px';
      window.scrollTo(0, 0);
    };
    window.visualViewport.addEventListener('resize', fitToVisualViewport);
    window.visualViewport.addEventListener('scroll', fitToVisualViewport);
    fitToVisualViewport();
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  function addMsg(text, type, sources) {
    document.getElementById('suggestions').style.display = 'none';
    const welcome = chatArea.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    if (sources && sources.length) {
      const s = document.createElement('div');
      s.className = 'sources';
      s.textContent = '📂 ' + sources.join(' · ');
      div.appendChild(s);
    }
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function ask(text) {
    input.value = text;
    sendQuestion();
  }

  async function sendQuestion() {
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMsg(q, 'user');

    const thinking = addMsg('', 'thinking');
    thinking.innerHTML = 'Thinking <span class="dots"><span>.</span><span>.</span><span>.</span></span>';

    try {
      const res = await fetch(`${SERVER}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q })
      });
      const data = await res.json();
      thinking.remove();
      addMsg(data.answer, 'ai', data.sources);
    } catch (e) {
      thinking.remove();
      addMsg('⚠️ Could not connect to AI server. Make sure the server is running.', 'ai');
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
