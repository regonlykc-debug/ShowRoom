<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Khalaifat Catalogues</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#263B59;
    --steel:#45738E;
    --pale:#D3E5E8;
    --brass:#B8935A;
    --paper:#F7F5F1;
    --ink:#1B2A3D;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:radial-gradient(circle at 18% -10%, #2f496c 0%, var(--navy) 55%);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  button{font-family:inherit;}
  :focus-visible{outline:2px solid var(--brass);outline-offset:3px;}

  /* ---------- top bar ---------- */
  .topbar{display:flex;justify-content:space-between;align-items:center;
    padding:28px clamp(24px,5vw,64px);}
  .brandmark{display:flex;align-items:center;}
  .brandmark img{height:70px;width:auto;}
  .hint{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(247,245,241,.5);}

  /* ---------- hero ---------- */
  .hero{position:relative;padding:clamp(8px,3vw,24px) clamp(24px,5vw,64px) clamp(40px,6vw,68px);}
  .hero::after{content:"";position:absolute;left:clamp(24px,5vw,64px);right:clamp(24px,5vw,64px);
    bottom:0;height:1px;background:linear-gradient(90deg,var(--brass),transparent 65%);opacity:.55;}
  .eyebrow{font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);margin:0 0 16px;}
  .hero h1{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(2.2rem,5.6vw,3.8rem);
    line-height:1.06;margin:0 0 18px;}
  .hero h1 em{font-style:italic;color:var(--pale);font-weight:300;}
  .hero-sub{max-width:48ch;color:rgba(247,245,241,.72);font-size:1rem;line-height:1.6;margin:0;}

  /* ---------- brand shelf ---------- */
  .shelf{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;
    padding:clamp(28px,5vw,56px) clamp(24px,5vw,64px) clamp(40px,6vw,72px);}
  @media (max-width:900px){.shelf{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:560px){.shelf{grid-template-columns:1fr;}}

  .plate{
    position:relative;text-align:left;color:var(--paper);
    background:linear-gradient(155deg,var(--steel),var(--navy) 80%);
    border:none;border-radius:5px;padding:36px 30px 28px;min-height:180px;
    display:flex;flex-direction:column;justify-content:space-between;
    cursor:pointer;box-shadow:inset 0 0 0 1px rgba(247,245,241,.1);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .plate:hover{box-shadow:inset 0 0 0 1px rgba(247,245,241,.22);}
  .plate:active{transform:scale(.97);}
  .plate::before{content:"";position:absolute;top:16px;left:26px;width:28px;height:2px;background:var(--brass);}
  .plate-top{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .plate-name{font-family:'Fraunces',serif;font-size:1.55rem;letter-spacing:.02em;}
  .plate-logo{height:52px;width:auto;max-width:160px;object-fit:contain;filter:brightness(0) invert(1);opacity:.85;}
  .plate-logos{display:flex;align-items:center;gap:10px;}
  .plate-logos img{height:42px;width:auto;max-width:120px;object-fit:contain;filter:brightness(0) invert(1);opacity:.85;}
  .plate-meta{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(247,245,241,.6);margin-top:10px;}

  .plate--empty{
    background:transparent;border:1px dashed rgba(247,245,241,.26);
    align-items:center;justify-content:center;flex-direction:row;gap:10px;
    color:rgba(247,245,241,.38);cursor:default;min-height:148px;
  }
  .plate--empty::before{display:none;}
  .plate--empty .plus{font-size:1.3rem;color:var(--brass);}
  .plate--empty span:last-child{font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;}

  footer{display:flex;justify-content:space-between;align-items:center;
    padding:0 clamp(24px,5vw,64px) 40px;font-size:.7rem;letter-spacing:.06em;color:rgba(247,245,241,.38);}
  .explore-btn{background:none;border:1px solid var(--brass);color:var(--brass);
    padding:10px 22px;border-radius:3px;font-size:.76rem;letter-spacing:.12em;
    text-transform:uppercase;cursor:pointer;font-family:inherit;transition:background .2s,color .2s;}
  .explore-btn:hover{background:var(--brass);color:var(--navy);}

  /* ---------- auto-play badge ---------- */
  .auto-badge{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:70;
    background:rgba(0,0,0,.6);backdrop-filter:blur(8px);color:var(--paper);
    padding:10px 28px;border-radius:30px;font-size:.74rem;letter-spacing:.1em;
    text-transform:uppercase;opacity:0;pointer-events:none;transition:opacity .4s;}
  .auto-badge.show{opacity:1;pointer-events:auto;}

  /* ---------- scrim ---------- */
  .scrim{position:fixed;inset:0;background:rgba(13,20,30,.55);backdrop-filter:blur(2px);
    opacity:0;pointer-events:none;transition:opacity .3s ease;z-index:40;}
  .scrim.show{opacity:1;pointer-events:auto;}

  /* ---------- drawer ---------- */
  .drawer{
    position:fixed;top:0;right:0;height:100%;width:min(560px,88vw);
    background:var(--paper);color:var(--ink);
    transform:translateX(100%);transition:transform .45s cubic-bezier(.16,1,.3,1);
    z-index:50;padding:30px 32px;display:flex;flex-direction:column;
    box-shadow:-16px 0 50px rgba(0,0,0,.3);
  }
  .drawer.open{transform:translateX(0);}
  .drawer-close{align-self:flex-end;background:none;border:none;font-size:.76rem;
    letter-spacing:.1em;text-transform:uppercase;color:var(--steel);cursor:pointer;padding:8px 4px;}
  .drawer h2{font-family:'Fraunces',serif;font-size:1.9rem;margin:8px 0 4px;}
  .drawer-sub{color:var(--steel);font-size:.84rem;margin-bottom:26px;}
  .drawer-list{display:flex;flex-direction:column;gap:14px;overflow-y:auto;}
  .cat-card{
    border:1px solid rgba(38,59,89,.16);border-radius:4px;padding:18px 20px;
    display:flex;justify-content:space-between;align-items:center;cursor:pointer;
    background:#fff;transition:border-color .2s, transform .15s;
  }
  .cat-card:active{transform:scale(.98);}
  .cat-card:hover{border-color:var(--brass);}
  .cc-title{font-family:'Fraunces',serif;font-size:1.1rem;}
  .cc-year{font-size:.7rem;color:var(--steel);letter-spacing:.08em;margin-top:4px;}
  .cc-arrow{color:var(--brass);font-size:1.3rem;}

  /* ---------- viewer ---------- */
  .viewer{position:fixed;inset:0;background:var(--navy);z-index:60;
    display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s;}
  .viewer.open{opacity:1;pointer-events:auto;}
  .viewer-bar{display:flex;align-items:center;justify-content:space-between;
    padding:18px clamp(20px,4vw,48px);}
  .viewer-title{font-family:'Fraunces',serif;font-size:1rem;}
  .viewer-progress{font-size:.76rem;letter-spacing:.08em;color:rgba(247,245,241,.6);}
  #viewerClose{background:none;border:1px solid rgba(247,245,241,.3);color:var(--paper);
    border-radius:3px;padding:8px 16px;font-size:.72rem;letter-spacing:.1em;
    text-transform:uppercase;cursor:pointer;}

  .page-stage{flex:1;display:flex;align-items:center;justify-content:center;
    position:relative;padding:8px 76px 28px;}
  #pdfCanvas{background:#fff;box-shadow:0 30px 60px rgba(0,0,0,.35);
    max-width:100%;max-height:100%;border-radius:2px;visibility:hidden;}
  .loading{position:absolute;color:rgba(247,245,241,.7);font-size:.82rem;
    letter-spacing:.08em;text-transform:uppercase;}

  .page-nav{
    position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;
    border-radius:50%;border:1px solid rgba(247,245,241,.25);background:rgba(247,245,241,.06);
    color:var(--paper);font-size:1.5rem;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .page-nav.prev{left:clamp(12px,3vw,32px);}
  .page-nav.next{right:clamp(12px,3vw,32px);}
  .page-nav:disabled{opacity:.22;cursor:default;}
  .page-nav:active{transform:translateY(-50%) scale(.92);}

  /* ---------- splash screen ---------- */
  .splash{position:fixed;inset:0;z-index:100;background:var(--navy);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:28px;cursor:pointer;transition:opacity .5s ease;}
  .splash.hide{opacity:0;pointer-events:none;}
  .splash img{height:100px;width:auto;}
  .splash-text{font-size:.82rem;letter-spacing:.18em;text-transform:uppercase;
    color:rgba(247,245,241,.5);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}

  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}
</style>
</head>
<body>

  <div class="splash" id="splash">
    <img src="assets/white-transparetn.png" alt="Khalaifat">
    <div class="splash-text">Tap to enter</div>
  </div>

  <header class="topbar">
    <div class="brandmark">
      <img src="assets/white-transparetn.png" alt="Khalaifat Catalogues">
    </div>
    <div class="hint">Tap a brand to browse</div>
  </header>

  <main>
    <section class="hero">
      <p class="eyebrow">Digital Showroom</p>
      <h1>Catalogues,<br><em>at the counter.</em></h1>
      <p class="hero-sub">Every brand catalogues</p>
    </section>

    <section class="shelf" id="shelf" aria-label="Brand selection"></section>
  </main>

  <footer>
    <span>Khalaifat Co. W.L.L — Digital Catalogue Wall</span>
    <button class="explore-btn" id="exploreBtn">Explore All Catalogues</button>
  </footer>

  <div class="auto-badge" id="autoBadge">Auto-browsing — tap anywhere to stop</div>

  <div class="scrim" id="scrim"></div>

  <aside class="drawer" id="drawer" aria-hidden="true">
    <button class="drawer-close" id="drawerClose">Close ✕</button>
    <h2 id="drawerTitle"></h2>
    <p class="drawer-sub" id="drawerSub"></p>
    <div class="drawer-list" id="drawerList"></div>
  </aside>

  <div class="viewer" id="viewer" aria-hidden="true">
    <div class="viewer-bar">
      <button id="viewerClose">Close ✕</button>
      <div class="viewer-title" id="viewerTitle"></div>
      <div class="viewer-progress" id="viewerProgress"></div>
    </div>
    <button class="page-nav prev" id="prevPage" aria-label="Previous page">‹</button>
    <div class="page-stage">
      <canvas id="pdfCanvas"></canvas>
      <div class="loading" id="viewerLoading">Loading…</div>
    </div>
    <button class="page-nav next" id="nextPage" aria-label="Next page">›</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
  document.getElementById('splash').addEventListener('click', ()=>{
    const el = document.documentElement;
    const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if(rfs) rfs.call(el).catch(()=>{});
    document.getElementById('splash').classList.add('hide');
    setTimeout(()=>{ document.getElementById('splash').remove(); }, 600);
  });

  /* ==========================================================
     BRAND / CATALOGUE CONFIG
     To add a brand: drop its PDF(s) in pdfs/<brand-id>/ and add
     an entry below. Nothing else in this file needs to change.
     ========================================================== */
  const BRANDS = [
    {
      id: 'beko',
      name: 'BEKO',
      tagline: "Europe's No.1 large appliances brand",
      logos: ['assets/beko.png'],
      catalogues: [
        { title: 'Built-In Appliances', year: '2025', file: 'pdfs/beko/beko-built-in-2025.pdf' },
        { title: 'Home Appliances',     year: '2025', file: 'pdfs/beko/beko-freestanding-2025.pdf' }
      ]
    },
    {
      id: 'poggenpohl',
      name: 'POGGENPOHL',
      tagline: 'Luxury kitchen architecture since 1892',
      logos: [],
      catalogues: [
        { title: 'Kitchen Architecture', year: '2025', file: 'pdfs/poggenpohl/Poggenpohl_Catalogue_Kitchen_Architecture_EN.pdf' }
      ]
    },
    {
      id: 'cosentino',
      name: 'COSENTINO',
      tagline: 'Silestone · Dekton · Sensa',
      logos: ['assets/silestone logo.svg', 'assets/Logo-Dekton copy.svg'],
      catalogues: [
        { title: 'Product Guide', year: '2026', file: 'pdfs/cosentino/PRODUCTGUIDE 2026[95].pdf' }
      ]
    }
  ];
  const EMPTY_SLOTS = 3; // "Add brand" placeholders shown on the shelf

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const shelf          = document.getElementById('shelf');
  const scrim           = document.getElementById('scrim');
  const drawer           = document.getElementById('drawer');
  const drawerTitle  = document.getElementById('drawerTitle');
  const drawerSub     = document.getElementById('drawerSub');
  const drawerList    = document.getElementById('drawerList');
  const viewer            = document.getElementById('viewer');
  const viewerTitle    = document.getElementById('viewerTitle');
  const viewerProgress= document.getElementById('viewerProgress');
  const canvas          = document.getElementById('pdfCanvas');
  const ctx                = canvas.getContext('2d');
  const loadingEl      = document.getElementById('viewerLoading');
  const prevBtn          = document.getElementById('prevPage');
  const nextBtn          = document.getElementById('nextPage');
  const stageEl          = document.querySelector('.page-stage');

  function buildShelf(){
    shelf.innerHTML = '';
    BRANDS.forEach(brand=>{
      const el = document.createElement('button');
      el.className = 'plate';
      const logoHtml = brand.logos && brand.logos.length === 1
        ? `<img class="plate-logo" src="${brand.logos[0]}" alt="${brand.name}">`
        : brand.logos && brand.logos.length > 1
          ? `<div class="plate-logos">${brand.logos.map(l=>`<img src="${l}" alt="">`).join('')}</div>`
          : '';
      el.innerHTML = `
        <div class="plate-top">
          <div class="plate-name">${brand.name}</div>
          ${logoHtml}
        </div>
        <div class="plate-meta">${brand.catalogues.length} catalogue${brand.catalogues.length>1?'s':''}</div>`;
      el.addEventListener('click', ()=>openDrawer(brand));
      shelf.appendChild(el);
    });
    for(let i=0;i<EMPTY_SLOTS;i++){
      const el = document.createElement('div');
      el.className = 'plate plate--empty';
      el.innerHTML = `<span class="plus">+</span><span>Add brand</span>`;
      shelf.appendChild(el);
    }
  }

  function openDrawer(brand){
    drawerTitle.textContent = brand.name;
    drawerSub.textContent   = brand.tagline || '';
    drawerList.innerHTML    = '';
    brand.catalogues.forEach(cat=>{
      const card = document.createElement('div');
      card.className = 'cat-card';
      card.tabIndex = 0;
      card.innerHTML = `
        <div>
          <div class="cc-title">${cat.title}</div>
          <div class="cc-year">${cat.year}</div>
        </div>
        <div class="cc-arrow">›</div>`;
      card.addEventListener('click', ()=>openViewer(brand, cat));
      card.addEventListener('keydown', e=>{ if(e.key==='Enter') openViewer(brand,cat); });
      drawerList.appendChild(card);
    });
    scrim.classList.add('show');
    drawer.classList.add('open');
    drawer.setAttribute('aria-hidden','false');
  }
  function closeDrawer(){
    drawer.classList.remove('open');
    drawer.setAttribute('aria-hidden','true');
    if(!viewer.classList.contains('open')) scrim.classList.remove('show');
  }

  let pdfDoc = null, pageNum = 1, rendering = false;

  async function openViewer(brand, cat){
    closeDrawer();
    viewerTitle.textContent = `${brand.name} — ${cat.title} ${cat.year}`;
    viewerProgress.textContent = '';
    viewer.classList.add('open');
    scrim.classList.add('show');
    viewer.setAttribute('aria-hidden','false');
    loadingEl.style.display = 'block';
    loadingEl.textContent = 'Loading…';
    canvas.style.visibility = 'hidden';
    try{
      pdfDoc = await pdfjsLib.getDocument(cat.file).promise;
      pageNum = 1;
      await renderPage(pageNum);
    }catch(err){
      loadingEl.textContent = 'Could not load this catalogue — check the PDF file path.';
      console.error(err);
    }
  }
  function closeViewer(){
    viewer.classList.remove('open');
    viewer.setAttribute('aria-hidden','true');
    scrim.classList.remove('show');
    pdfDoc = null;
  }

  async function renderPage(num){
    if(!pdfDoc || rendering) return;
    rendering = true;
    loadingEl.style.display = 'block';
    const page  = await pdfDoc.getPage(num);
    const maxW  = stageEl.clientWidth  - 140;
    const maxH  = stageEl.clientHeight - 40;
    const base  = page.getViewport({ scale: 1 });
    const scale = Math.min(maxW / base.width, maxH / base.height);
    const dpr   = window.devicePixelRatio || 1;
    const viewport = page.getViewport({ scale: scale * dpr });

    canvas.width  = viewport.width;
    canvas.height = viewport.height;
    canvas.style.width  = (viewport.width  / dpr) + 'px';
    canvas.style.height = (viewport.height / dpr) + 'px';

    await page.render({ canvasContext: ctx, viewport }).promise;
    canvas.style.visibility = 'visible';
    loadingEl.style.display = 'none';
    viewerProgress.textContent = `${num} / ${pdfDoc.numPages}`;
    prevBtn.disabled = num <= 1;
    nextBtn.disabled = num >= pdfDoc.numPages;
    rendering = false;
  }

  prevBtn.addEventListener('click', ()=>{ if(pageNum>1){ pageNum--; renderPage(pageNum); } });
  nextBtn.addEventListener('click', ()=>{ if(pdfDoc && pageNum<pdfDoc.numPages){ pageNum++; renderPage(pageNum); } });

  document.addEventListener('keydown', e=>{
    if(!viewer.classList.contains('open')) return;
    if(e.key==='ArrowRight') nextBtn.click();
    if(e.key==='ArrowLeft')  prevBtn.click();
    if(e.key==='Escape')     closeViewer();
  });

  // swipe support for tablets
  let touchX = null;
  stageEl.addEventListener('touchstart', e=>{ touchX = e.changedTouches[0].clientX; });
  stageEl.addEventListener('touchend', e=>{
    if(touchX===null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if(Math.abs(dx) > 50){ dx<0 ? nextBtn.click() : prevBtn.click(); }
    touchX = null;
  });

  document.getElementById('drawerClose').addEventListener('click', closeDrawer);
  document.getElementById('viewerClose').addEventListener('click', closeViewer);
  scrim.addEventListener('click', ()=>{ closeViewer(); closeDrawer(); });
  window.addEventListener('resize', ()=>{ if(pdfDoc) renderPage(pageNum); });

  buildShelf();

  /* ==========================================================
     AUTO-BROWSE / KIOSK SCREENSAVER
     Starts after IDLE_TIMEOUT of no interaction, or manually
     via the footer button. Flips through every page of every
     catalogue, then loops. Any touch/click/key stops it.
     ========================================================== */
  const IDLE_TIMEOUT  = 60000; // 60s before auto-start
  const PAGE_INTERVAL = 4000;  // 4s per page flip

  const autoBadge = document.getElementById('autoBadge');
  let idleTimer   = null;
  let autoPlaying = false;
  let autoTimer   = null;
  let autoCatList = [];
  let autoCatIdx  = 0;

  function resetIdleTimer(){
    clearTimeout(idleTimer);
    if(autoPlaying) return;
    idleTimer = setTimeout(startAutoPlay, IDLE_TIMEOUT);
  }

  function buildCatalogueList(){
    const list = [];
    BRANDS.forEach(brand=>{
      brand.catalogues.forEach(cat=>{
        list.push({ brand, cat });
      });
    });
    return list;
  }

  async function startAutoPlay(){
    if(autoPlaying) return;
    autoPlaying = true;
    autoBadge.classList.add('show');
    autoCatList = buildCatalogueList();
    if(autoCatList.length === 0) { stopAutoPlay(); return; }
    autoCatIdx = 0;
    await openAutoCatalogue();
  }

  async function openAutoCatalogue(){
    if(!autoPlaying || autoCatIdx >= autoCatList.length) {
      // loop back to start
      autoCatIdx = 0;
    }
    const { brand, cat } = autoCatList[autoCatIdx];
    closeDrawer();
    viewerTitle.textContent = `${brand.name} — ${cat.title} ${cat.year}`;
    viewerProgress.textContent = '';
    viewer.classList.add('open');
    viewer.setAttribute('aria-hidden','false');
    loadingEl.style.display = 'block';
    loadingEl.textContent = 'Loading…';
    canvas.style.visibility = 'hidden';
    prevBtn.style.display = 'none';
    nextBtn.style.display = 'none';
    document.getElementById('viewerClose').style.display = 'none';
    try {
      pdfDoc = await pdfjsLib.getDocument(cat.file).promise;
      pageNum = 1;
      await renderPage(pageNum);
      scheduleNextAutoPage();
    } catch(err) {
      console.error(err);
      autoCatIdx++;
      if(autoPlaying) setTimeout(()=>openAutoCatalogue(), 1000);
    }
  }

  function scheduleNextAutoPage(){
    clearTimeout(autoTimer);
    if(!autoPlaying) return;
    autoTimer = setTimeout(async ()=>{
      if(!autoPlaying || !pdfDoc) return;
      if(pageNum < pdfDoc.numPages){
        pageNum++;
        await renderPage(pageNum);
        scheduleNextAutoPage();
      } else {
        autoCatIdx++;
        await openAutoCatalogue();
      }
    }, PAGE_INTERVAL);
  }

  function stopAutoPlay(){
    autoPlaying = false;
    clearTimeout(autoTimer);
    autoBadge.classList.remove('show');
    prevBtn.style.display = '';
    nextBtn.style.display = '';
    document.getElementById('viewerClose').style.display = '';
    if(viewer.classList.contains('open')) closeViewer();
    resetIdleTimer();
  }

  ['click','touchstart','keydown','mousemove'].forEach(evt=>{
    document.addEventListener(evt, e=>{
      if(autoPlaying){
        if(e.target === document.getElementById('exploreBtn')) return;
        stopAutoPlay();
        return;
      }
      resetIdleTimer();
    }, { passive: true });
  });

  document.getElementById('exploreBtn').addEventListener('click', e=>{
    e.stopPropagation();
    startAutoPlay();
  });

  resetIdleTimer();
  </script>
</body>
</html>
