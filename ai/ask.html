<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Khalaifat AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/chat.css">
</head>
<body>

<header>
  <div class="logo">KHALAIFAT — AI Assistant</div>
  <div class="header-actions">
    <button class="new-chat-btn" id="newChatBtn">محادثة جديدة / New chat</button>
    <div class="ai-badge">Powered by AI</div>
  </div>
</header>

<div class="chat-area" id="chatArea">
  <div class="welcome trim">
    <h2>مرحباً بك / Welcome</h2>
    <p>اسألني عن أي منتج في الكتالوجات<br>Ask me anything about our catalogues</p>
  </div>
</div>

<div class="suggestions" id="suggestions">
  <button class="suggestion" onclick="ask('What kitchen hoods does Elica offer?')">Elica hoods</button>
  <button class="suggestion" onclick="ask('ما هي أجهزة البيكو المتاحة؟')">أجهزة BEKO</button>
  <button class="suggestion" onclick="ask('What Bosch appliances are available?')">Bosch appliances</button>
  <button class="suggestion" onclick="ask('ما هي ألوان Silestone المتوفرة؟')">ألوان Silestone</button>
</div>

<div class="input-bar">
  <textarea id="input" placeholder="اسأل عن المنتجات... / Ask about products..." rows="1"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendQuestion()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const SERVER = window.location.origin;
  const chatArea = document.getElementById('chatArea');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const history = [];
  const welcomeHTML = chatArea.innerHTML;

  // Tablets' on-screen keyboard shrinks the *visible* area without shrinking
  // 100vh/height:100% in most mobile browsers, so the input bar at the bottom
  // of this flex-column page can end up rendered below the visible area, behind
  // the keyboard. Force the page to the actual visible height via the
  // VisualViewport API so the layout compresses to fit above the keyboard.
  if (window.visualViewport) {
    const fitToVisualViewport = () => {
      document.documentElement.style.height = window.visualViewport.height + 'px';
      document.body.style.height = window.visualViewport.height + 'px';
      window.scrollTo(0, 0);
    };
    window.visualViewport.addEventListener('resize', fitToVisualViewport);
    window.visualViewport.addEventListener('scroll', fitToVisualViewport);
    fitToVisualViewport();
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  function addMsg(text, type, sources) {
    document.getElementById('suggestions').style.display = 'none';
    const welcome = chatArea.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `msg ${type}` + (type === 'ai' ? ' trim trim--tight' : '');
    div.dir = 'auto';
    div.textContent = text;
    if (sources && sources.length) {
      const s = document.createElement('div');
      s.className = 'sources';
      s.textContent = '📂 ' + sources.join(' · ');
      div.appendChild(s);
    }
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function ask(text) {
    input.value = text;
    sendQuestion();
  }

  async function sendQuestion() {
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMsg(q, 'user');

    const thinking = addMsg('', 'thinking');
    thinking.innerHTML = 'Thinking <span class="dots"><span>.</span><span>.</span><span>.</span></span>';

    try {
      const res = await fetch(`${SERVER}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, history: history.slice(-6) })
      });
      const data = await res.json();
      thinking.remove();
      addMsg(data.answer, 'ai', data.sources);
      history.push({ role: 'user', content: q });
      history.push({ role: 'assistant', content: data.answer });
    } catch (e) {
      thinking.remove();
      addMsg('⚠️ Could not connect to AI server. Make sure the server is running.', 'ai');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function newChat() {
    chatArea.innerHTML = welcomeHTML;
    document.getElementById('suggestions').style.display = '';
    history.length = 0;
  }
  document.getElementById('newChatBtn').addEventListener('click', newChat);
</script>
</body>
</html>
